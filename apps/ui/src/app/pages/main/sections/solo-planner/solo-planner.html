<div class="solo-planner-container">
  <div class="sidebar-column">
    <aside class="sidebar">
      <app-configuration
        (yearChange)="onYearChange($event)"
        (holidaysChange)="onHolidaysChange($event)"
        (searchChange)="onSearch($event)"
      ></app-configuration>
    </aside>
    <div class="tip-container">
      <p>
        <strong>{{ 'SoloPlanner.Note' | translate }}:</strong>
        {{ 'SoloPlanner.NoteText' | translate }}
      </p>
    </div>
  </div>
  <main class="content">
    <app-vacation-results
      [results]="vacationResults()"
      [selectedOptions]="selectedOptions()"
      [ptoBudget]="ptoBudget()"
      [totalPtoUsed]="totalPtoUsed()"
      [hasSearched]="hasSearched()"
      [midWeekFilteredCount]="midWeekFilteredCount()"
      (optionToggle)="onToggleOption($event)"
      (autoOptimize)="onAutoOptimize()"
      (clearSelection)="onClearSelection()"
      (exportCalendar)="onExportCalendar()"
    ></app-vacation-results>
    <app-calendar-overview
      [selectedYear]="selectedYear()"
      [holidays]="holidays()"
      [highlightedPtoDates]="allPtoDates()"
    ></app-calendar-overview>
  </main>
</div>
